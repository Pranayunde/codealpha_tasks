<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ConnectHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main class="auth-page">
    <div class="auth-split">
      <div class="auth-visual">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800&q=80" alt="People collaborating">
        <div class="auth-visual-content">
          <h2>Welcome back to ConnectHub</h2>
          <p>Jump back into your feed, catch up with friends, and share what matters to you.</p>
        </div>
      </div>
      <div class="auth-container">
        <h1>Login</h1>
        <p class="auth-subtitle">Sign in to your account</p>
        <div id="alert"></div>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="register.html">Sign up</a></p>
        <p class="demo-hint">Demo: alice@example.com / password123</p>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
